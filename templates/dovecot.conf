# Dovecot main configuration - Managed by Hosting Control Panel
# Do not edit manually — changes will be overwritten.
#
# This file includes the configuration files from conf.d/ directory.

protocols = imap pop3 lmtp

# Logging
log_path = syslog
syslog_facility = mail
auth_verbose = no
mail_debug = no

# Strict TLS configs
ssl = required
ssl_min_protocol = TLSv1.2
ssl_prefer_server_ciphers = yes
disable_plaintext_auth = yes

# Include configuration files
!include conf.d/*.conf
!include_try local.conf
