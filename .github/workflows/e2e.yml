name: E2E Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: e2e-${{ github.ref }}
  # Only cancel in-progress runs for PRs; let main-branch runs complete so a slow
  # Docker build (cold cache) is never killed mid-wait by a follow-up push.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-24.04
    # Cold Rust+WASM build can take 25-30 min; give the full job 60 min.
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # BuildKit fetches individual layer blobs on-demand from the GHA cache
      # API — much faster and more reliable than restoring a local tarball.
      - name: Build sandbox image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: sandbox/Dockerfile
          push: false
          load: true
          tags: panel-sandbox:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start sandbox container
        # --wait blocks until the service healthcheck passes (panel HTTP on :8080).
        # This ensures the container is healthy before the wait-for-services step,
        # so that step only needs to verify individual hosting services.
        run: |
          docker compose -f sandbox/docker-compose.test.yml up -d --wait --wait-timeout 300
        timeout-minutes: 8
        env:
          COMPOSE_PROJECT_NAME: panel_e2e

      - name: Wait for sandbox services to be ready
        run: bash sandbox/scripts/wait-for-services.sh
        timeout-minutes: 10

      - name: Dump sandbox logs on failure
        if: failure()
        run: docker exec panel-sandbox cat /opt/panel/sandbox.log || true

      - name: Run Playwright E2E tests
        run: npx playwright test --config tests/e2e/playwright.config.ts
        env:
          CI: true
          BASE_URL: http://localhost:8080

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_attempt }}
          path: playwright-report/
          retention-days: 14

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results-${{ github.run_attempt }}
          path: test-results/
          retention-days: 7

      - name: Stop sandbox container
        if: always()
        run: docker compose -f sandbox/docker-compose.test.yml down -v
        env:
          COMPOSE_PROJECT_NAME: panel_e2e
