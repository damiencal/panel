name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'landing/**'
  # Allow manual re-deployment from the Actions tab
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; cancel any queued run but never cancel
# an already-running deployment so we don't leave Pages in a broken state.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Deploy only the contents of the /landing folder
          path: landing

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
