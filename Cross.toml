# Cross-compilation configuration for `cross` (https://github.com/cross-rs/cross)
# Installs OpenSSL dev libraries for the target architecture inside the
# cross Docker container before building. Required because rust-s3 depends
# on native-tls which links against OpenSSL.

[target.aarch64-unknown-linux-gnu]
# Use Ubuntu-based cross image with OpenSSL 3.x (the default cross image
# ships OpenSSL 1.0.2 which is rejected by openssl-sys >= 0.9.100).
image = "ghcr.io/cross-rs/aarch64-unknown-linux-gnu:main"
pre-build = [
    "dpkg --add-architecture arm64",
    "apt-get update -qq",
    "apt-get install -y --no-install-recommends libssl-dev:arm64 pkg-config",
]
